apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: ebs-dyanamic
spec:
 accessModes:
  - ReadWriteOnce
 storageClassName: roboshop-ebs
 resources:
  requests:
   storage: 2Gi
-------
apiVersion: v1
kind: Pod
metadata:
 name: nginx
 labels:
  porpose: ebs-dyanamic
  project: roboshop-ebs
spec:
 nodeSelectors: 
  topology.kubernetes.io/zone: us-east-1c
 containers:
 - name: nginx
   image: nginx
   volumeMounts:
  - name: persistent-storage
    mountPath: /usr/share/nginx/html
volumes:
- name: persistent-storage
  persistentVolumeClaim:
   claimName: ebs-dynamic